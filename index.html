function capitalize(s) {

function ptInPoly(point, polyPoints) {
  let [x,y] = [point.x, point.y];
  let inside = false;
  for (let i = 0, j = polyPoints.length - 1; i < polyPoints.length; j = i++) {
    var xi = polyPoints[i].x, yi = polyPoints[i].y;
    var xj = polyPoints[j].x, yj = polyPoints[j].y;
    var intersect = ((yi > y) != (yj > y))
        && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
};

function getType(o) {
  function getTypeRecursive(data, t={}) {
    const prop = Object.fromEntries(Object.entries(data).filter(([k,v]) => typeof v !== 'object' || k=='replace'));

    if (prop.icon && !prop.category) {
      t.category_icon = t.icon;
    }

    for (const[field, section] of Object.entries(data.match||{})) {
      const value = o[field];
      if (!value) continue;

      // try exact match first (faster)
      const entry = section[value];
      if (entry) {
        return getTypeRecursive(entry, {...t, category: value, ...prop});
      }

      /*
      // no match, try regex over presorted entries (VERY SLOW, need to speed it up!)
      for (const [regex, entry] of Object.entries(section).filter(s=>/[^A-Za-z0-9_]/.test(s)).sort(([,a],[,b])=>(b.weight??0)-(a.weight??0))) {
        if (value.match(new RegExp(regex, "i"))) {
          return getTypeRecursive(entry, {...t, category: value, ...prop});
        }
      }
      */

    }
    return {...t, ...prop};
  }

  return getTypeRecursive(typeData);
}

let regexCache = null;

let getType2 = function(o) {
  // preprocess regex cache on first call
  if (!regexCache) {
    regexCache = new WeakMap();

    function preprocess(node) {
      if (!node.match) return;

      const nodeCache = {};
      for (const [field, map] of Object.entries(node.match)) {
        const arr = [];
        for (const [k, entry] of Object.entries(map)) {
          if (/[\^\*\+\$\|\(\)\[\]\{\}]/.test(k)) {
            arr.push({ re: new RegExp(k, "i"), entry });
          }
        }

        if (arr.length) {
          arr.sort((a,b)=>(b.entry?.weight??0)-(a.entry?.weight??0));
          nodeCache[field] = arr;
        }
      }

      regexCache.set(node, nodeCache);

      // recurse into child nodes
      for (const map of Object.values(node.match)) {
        for (const entry of Object.values(map)) {
          if (entry && typeof entry === "object") preprocess(entry);
        }
      }
    }

    preprocess(typeData);
  }

  function rec(node, t = {}) {
    // collect non-object props except "replace"
    const prop = Object.fromEntries(
      Object.entries(node).filter(([k, v]) => typeof v !== "object" || k === "replace")
    );

    if (prop.icon && !prop.category) t.category_icon = t.icon;

    for (const [field, exactMap] of Object.entries(node.match || {})) {
      const value = o[field];
      if (!value) continue;

      // 1) exact match
      const ex = exactMap[value];
      if (ex) return rec(ex, { ...t, category: value, ...prop });

      // 2) regex match from cache
      const cached = regexCache.get(node)?.[field] || [];
      for (const r of cached) {
        const matches = value.match(r.re);
        if (matches) {
          const entry = matches.length === 1 ? r.entry : Object.fromEntries(
            Object.entries(r.entry).map(([key, propValue]) => {
              return [
                key,
                typeof propValue === 'string'
                  ? propValue.replace(/\\\d+/g, m => matches[parseInt(m.slice(1))] || '')
                  : propValue
              ];
            })
          );
          return rec(entry, { ...t, category: value, ...prop });
        }
      }
    }

    return { ...t, ...prop };
  }

  return rec(typeData);
}

getType = getType2;

function parseFAClass(faClass) {
  const parts = faClass.trim().split(/\s+/);
  const prefix = parts.find(p => p.startsWith('fa-') || p === 'fa')?.replace('fa-', '') || 'solid';
  const iconName = parts.find(p => p.startsWith('fa-') && p !== 'fa' && p !== `fa-${prefix}`)?.replace('fa-', '');
  const prefixMap = { solid: 'fas', regular: 'far', light: 'fal', thin: 'fat', duotone: 'fad', brands: 'fab' };
  return { prefix: prefixMap[prefix] || 'fas', iconName };
}

}

  let input = document.body.appendChild(document.createElement("input"));

  input.focus();
  input.select();

function getSubtitle(feature) {
  let o = feature.properties;
  let t = getType(o);
  let s = '';

  if (o.spawns) {
    let pt = getType({...o, 'type': o.spawns, 'name': o.name + ':spawns' });
    s = pt.title || pt.category || 'Unnamed';
    s = s.replace(/ [+-]*\{.+\}(%*)/,''); // remove {} formatting
    if (s==t.title) s='';
  }

  if (o.coins) return `${o.coins} coins`;

  let title = o.ActorLabel || o.text || o.achievement || t.color || s;

  if (!title) {
    if (o.area) title = o.area.replace('subnautica.Area.','');
    if (o.progression) title += ' (' + o.progression.replace('subnautica.Story.','') + ')';
  }

  if (o.abilities) {
    let obj = o.abilities;
    if (typeof obj === 'string') {
        obj = obj.split(',').map(item => item.trim());
    }
    title += ' [' + (obj.map(s=>(s+'').split('.').pop()).join(',')) +']';
  }

  if (o.color) title += ' (' + (o.color+'').split('::').pop() +')';

  if (o.hidden===true || o.exists===false) title +=' (Hidden)';

  title = (title||'').replace('BP_','');

  return title
}

function customAnimateTo(map, targetView, duration = 200) {
    const startView = { pitch: map.getPitch() };
    const startTime = performance.now();
    function animate(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(1, elapsed / duration);
        const pitch = startView.pitch + (targetView.pitch - startView.pitch) * progress;
        map.setView({pitch: pitch});
        if (progress < 1) {
            requestAnimationFrame(animate);
        }
    }
    requestAnimationFrame(animate);
}

function compassOnClick(e) {
  if (map.getBearing()!=0) {
    map.animateTo({ bearing: 0 });
  } else {
      let newPitch = map.getPitch()!=0 ? 0 : defaultPitch;
      //map.animateTo({pitch: newPitch });
      //animateto fails here for some reason if clicked from compass (maptalks-gl@0.124.4 issue)
      customAnimateTo(map, { pitch: newPitch });
  }
}

function getCardinalBearing(deltaX, deltaY) {
  let bearing = Math.atan2(deltaX, -deltaY) * 180 / Math.PI;
  bearing = Math.round(bearing);
  if (bearing < 0) bearing += 360;

  // Convert bearing to cardinal direction
  const cardinalDirections = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
  const cardinalIndex = Math.round(bearing / 45) % 8;
  const cardinal = cardinalDirections[cardinalIndex];
  return `${cardinal} ${bearing}°`;
}

function getCoordinates(feature) {
  const cc = feature.geometry.coordinates;
  let p = cc.map(x=>x && x.toFixed(0) || 0);
  return `<hr><small style="white-space: nowrap;" title="Marker coordinates">Location: ${p[0]}, ${p[1]}, ${p[2]}</small>`;
}

function getDirections(feature) {
  if (feature.properties.type == playerMarkerType) return '';

  const t = feature.geometry.coordinates;
  const c = settings.playerPosition;

  if (!c) return '';

  const src = {x:c[0], y:c[1]};
  const dst = {x:t[0], y:t[1], z:t[2]};

  if (src.x==dst.x && src.y==dst.y) return '';

  // Calculate differences
  const deltaX = dst.x - src.x;
  const deltaY = dst.y - src.y;
  const deltaZ = dst.z || 0;

  // Calculate distance (2D horizontal distance)
  const horizontalDistance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
  const distanceMeters = Math.round(horizontalDistance/100);

  // Depth (absolute value since z is negative for depth)
  const depthMeters = Math.round(Math.abs(deltaZ)/100);

  const cb = getCardinalBearing(deltaX, deltaY);
  const cbr = getCardinalBearing(-deltaX, -deltaY);

  // Create directions
  const directions = `<hr><small style="white-space: nowrap;"><b>${cb}</b> / <b>${distanceMeters} m</b> from <a href="javascript:locatePlayer()">Player Position</a></small>`;

  return directions;
}

function locatePlayer() {
  map.animateTo({center: playerMarker.getCoordinates(), zoom: regionZoom});
}

let tooltipShowTimer = null;
let tooltipHideTimer = null;
let tooltipHideDelay = 1;
let tooltipShowDelay = 1;

function clearSelection() {
  if (window.getSelection) {
    // Modern browsers
    const selection = window.getSelection();
    if (selection.removeAllRanges) {
      selection.removeAllRanges();
    } else if (selection.collapseToEnd) {
      // For older WebKit browsers
      selection.collapseToEnd();
    }
  } else if (document.selection) {
    // Older versions of Internet Explorer
    document.selection.empty();
  }
}

function showTooltip(e) {
  var tooltip = document.getElementById('map-tooltip');

  clearTimeout(tooltipHideTimer);

  tooltip.onmouseover = function(e) {
    clearTimeout(tooltipHideTimer);
  };

  tooltip.onmouseout = function(e) {
    tooltipHideTimer = setTimeout(hideTooltip, tooltipHideDelay);
  };


  // Show the tooltip to calculate the size
  // Since browsers do not repaint the screen during synchronous JavaScript execution,
  // temporarily changing the display property within a script will not cause the element to flash visibly on the screen.

  if (tooltip.style.display == 'block') return;

  tooltip.style.display = 'block';
  let marker = e.target;
  let feature = marker.feature;
  let o = marker.feature.properties;

  let info = getType2(o);

  let subtitle = getSubtitle(marker.feature);

  let h1=capitalize(info.title||o.type||'undefined');
  let h2=capitalize(info.group||'');
  let h3=capitalize(subtitle||'');

  let cc = marker.feature.geometry.coordinates;

  let content = `<b title="${o.name}">${h1 + '&nbsp;'+ formatZ(cc)}</b>`;

  if (h2)
    content += `<br>${h2}`;

  content += `<br><small class="small">${h3}</small>`;

  let p = cc.map(x=>x.toFixed(0));
  content += `<hr><small title="Marker coordinates">${p[0]}, ${p[1]}, ${p[2]}</small>`;

  content += `${getDirections(feature)}`;

  tooltip.innerHTML = content;

  let c = marker.getContainerExtent();
  let screenPosition = {x: c.pxmin, y: c.pymin};

  // Determine the tooltip position
  var mapContainer = map.getContainer();
  var mapRect = mapContainer.getBoundingClientRect();
  var tooltipWidth = tooltip.offsetWidth;
  var tooltipHeight = tooltip.offsetHeight;

  // Calculate available space
  var spaceRight = mapRect.width - screenPosition.x;
  var spaceLeft = screenPosition.x;

  let offset = [30,30]; //getMarkerSize(marker)/2+5;

  // Position the tooltip
  if (spaceRight > tooltipWidth) {
    // Place tooltip to the right
    tooltip.style.left = mapRect.left + screenPosition.x + offset[0] + 'px';
    tooltip.className = 'arrow-left';
  } else {
    // Place tooltip to the left
    tooltip.style.left =  mapRect.left + screenPosition.x - tooltipWidth - offset[0] + 'px';
    tooltip.className = 'arrow-right';
  }

  tooltip.style.top = mapRect.top - offset[1] + screenPosition.y - tooltipHeight/2 + 'px';
}

// Function to hide the tooltip
function hideTooltip() {
  var tooltip = document.getElementById('map-tooltip');
  tooltip.style.display = 'none';
  clearSelection();
}

function showTooltipExt(e) {
  let marker = e.target;
  clearTimeout(tooltipShowTimer);
  if (marker.getInfoWindow() && marker.getInfoWindow().isVisible()) return; // do not open popup if there's an info window
  showTooltip(e);
}

function hideTooltipExt(e) {
  let marker = e.target;
  clearTimeout(tooltipShowTimer);
  clearTimeout(tooltipHideTimer);
  tooltipHideTimer = setTimeout(hideTooltip, tooltipHideDelay);
}

let activePolys = {};

function selectPolygon(polygon, selected){
  let name = polygon.feature?.properties?.name;
  if (selected) {
    polygon.updateSymbol({lineOpacity: 1.0, polygonOpacity: 0.5, lineColor: polygon.options.color });
    activePolys[name] = polygon;
  } else {
    polygon.updateSymbol({lineOpacity: 0.75, polygonOpacity: 0.1, lineColor: polygon.options.color });
    delete activePolys[name];
  }
}

function getBaseName(name) {
  return name && name.split(':').shift();
}

function toggleMarked(id) {
  let name = getBaseName(id);

  if (settings.markedItems[name]) {
    delete settings.markedItems[name];
  } else {
    settings.markedItems[name] = true;
  }

  let groupLayer = map.getLayer('GroupGLLayer');
  for (const layer of groupLayer.getLayers()) {
    for (marker of layer._geoList) {
      if (getBaseName(marker.feature.properties.name) == name) {
        let opacity = settings.markedItems[name] ? markedOpacity : 1;
        marker.updateSymbol({markerOpacity: opacity, lineOpacity: opacity });
      }
    }
  }

  saveSettings();
}

function applyHeightFactor(c, k=8) {
  if (c.x) return [c.x, c.y, c.z/k];
  return [c[0], c[1], c[2]/k];
}

function addMarker(feature, options) {
  let o = feature.properties;
  let t = getType(o);

  let getSymbol = function(feature,opacity=1) {

    var symbol = 
      {
        markerFile   : iconImages[t.icon]||iconImages['misc'],
        markerWidth  : iconSize,
        markerHeight : iconSize,
        markerDx     : 0,
        markerDy     : 0,//-Math.round(iconSize/2),
        markerOpacity: opacity,
        //markerVerticalAlignment: 'middle',
      };

    if (feature.properties.type=='regionMarker') {
        const textSymbol = {
            textName : feature.properties.title,
            textFaceName : 'sans-serif',
            textFill : '#fff',
            textSize : 16,
            textDx: 0,
            textDy: -10,

            textHaloFill      : '#000',
            textHaloRadius    : 2,
            textHaloOpacity   : 128,

        };

      //symbol = [ symbol, textSymbol, ];
      symbol = textSymbol;
    }

    return symbol;
  }

  //if (t.group=='misc' || t.group=='actors') return;

  const [x,y,z] = applyHeightFactor(feature.geometry.coordinates);

  //console.log(feature.geometry.coordinates);

  let [layers,counters,icons] = [options.layers, options.counters, options.icons];

  let opacity = settings.markedItems[getBaseName(feature.properties.name)] ? markedOpacity : 1;

  let line = new maptalks.LineString([[x,y,0],[x,y,z]], { symbol: { lineOpacity: opacity} });

  layers.lines = layers.lines||[];
  layers.lines.push(line);
  line.feature = feature;

  let draggable = feature.properties.type == playerMarkerType;

  //nb! since it's mostly underwater, let's set marker Z to zero and avoid all the parallax isues
  let marker = new maptalks.Marker([x,y,Math.max(0,z)], {
    draggable: draggable,
    symbol: getSymbol(feature, opacity),
    cursor:'pointer',
    eventsToStop: true,
  });

  marker.feature = feature; // leaflet uses marker.feature after loading geojson

  let layerName = t.group;
  
  if (o.type == 'regionMarker') layerName = 'labels';

  layers[layerName] = layers[layerName] || [];
  layers[layerName].push(marker);

  marker.setInfoWindow({autoCloseOn: 'click', single: true})
  .on('click', popupOnClick)
  .on('contextmenu', e=> { if (!mouseMoved) toggleMarked(e.target.feature.properties.name)})
  //.on('dragend', onDragEnd)

  let title = t.title || feature.properties.type;

  let subtitle = getSubtitle(feature);
  if (subtitle) subtitle = ' - ' + subtitle;

  let tooltipTitle = title;

  if (o.type == 'regionMarker') {
    tooltipTitle = o.name;
  } else {
    let cc = marker.feature.geometry.coordinates;
    tooltipTitle += ' '+formatZ(cc);
  }

  const tooltip = new maptalks.ui.ToolTip(`${tooltipTitle} (${translate(t.group)})`, {
      showTimeout: 100, // Delay in milliseconds before showing the tooltip
      dx: 10,           // X-offset from the geometry
      dy: -10           // Y-offset from the geometry
  });

  tooltip.addTo(marker);


  function rotatePointsInPlace(points, centerX, centerY, angle) {
      const rad = angle * Math.PI / 180;
      const cos = Math.cos(rad);
      const sin = Math.sin(rad);
    
      for (let i = 0; i < points.length; i++) {
          let px = points[i][0];
          let py = points[i][1];
        
          // Translate to origin
          const tx = px - centerX;
          const ty = py - centerY;
        
          // Rotate
          points[i][0] = tx * cos - ty * sin + centerX;
          points[i][1] = tx * sin + ty * cos + centerY;
          // z coordinate remains unchanged (points[i][2])
      }
  }

  function assignPolygon(feature, polygon, marker, color) {
    polygon.options.color = color;
    polygon.options.ref_marker = marker;
    marker.options.ref_polygon = polygon;

    if (feature.properties.type=='regionMarker') {
      polygon.updateSymbol( { lineColor: color, polygonFill: color });
    }

    polygon.on('click',function(e){
      let zoom = map.getZoom();
      //if (zoom<regionZoom) 
      {
        const marker = e.target.options.ref_marker;

        if (marker && marker.feature.properties.type != 'regionMarker') {
          popupOnClick({target: marker});
          marker.openInfoWindow();
        }

        const extent = e.target.getExtent();
        if (extent && zoom <= 4) {
          //map.fitExtent(extent);
          const center = extent.getCenter();
          map.animateTo({center: center, zoom: regionZoom});
          //selectPolygon(e.target, false);
        }
      }
      return false;
    });

    // Add hover effects
    polygon.on('mouseover', function(e) {
      selectPolygon(e.target, true);
    });

    polygon.on('mouseout', function(e) {
      //selectPolygon(e.target, false);
    });

    map.on('mousemove', function(e) {
      for (const [name, polygon] of Object.entries(activePolys)) {
        if (!ptInPoly(e.coordinate, polygon.getCoordinates()[0])) {
          selectPolygon(polygon, false);
        }
      }
    })

    polygon.feature = feature;

    return polygon;
  }

  function addRectangle(feature, x,y,z, w,h, angle, color, marker) {

    const defaultSymbol = {
      'lineColor': color,        // Border color
      'lineWidth': 2.0,          // Border width
      'polygonFill': color,      // Fill color
      'polygonOpacity': 0.1,     // Fill opacity
      'lineOpacity': 0.5,
    };

    let points = [];
    points.push([x-w, y-h, z]);
    points.push([x+w, y-h, z]);
    points.push([x+w, y+h, z]);
    points.push([x-w, y+h, z]);

    if (angle!=0) {
      rotatePointsInPlace(points, x,y, angle);
    }

    let polygon = new maptalks.Polygon(points, { symbol: defaultSymbol });

    layers.polygons = layers.polygons||[];
    layers.polygons.push(polygon);

    return assignPolygon(feature, polygon, marker, color);
  }

  if (o.type == 'UWEBoxWorldZone' && o.extent) {
    let color = regionMarkers[o.region]?.color || '#444a55';
    addRectangle(feature, x,y,z, o.extent.X, o.extent.Y, 0, color, marker);
  }

  if (o.type=='BP_EdgeOfWorldVolume_C' && o.rotation && o.scale) {
    addRectangle(feature, x,y,z, o.scale.X*50, o.scale.Y*50, o.rotation.Yaw, '#f00', marker);
  }

  if (o.type == 'regionMarker') {
    // find our poly, assign marker feature to it
    let groupLayer = map.getLayer('GroupGLLayer');
    for (const layer of groupLayer.getLayers()) {
      for (polygon of layer._geoList) {
        if (polygon.feature?.properties?.title?.startsWith('poly_')) {
          if (ptInPoly(marker._coordinates, polygon._coordinates)) {
            //poly.feature = marker.feature;
            let color = regionMarkers[marker.feature.properties.ActorLabel]?.color || '#fff';
            //color = '#fff';
            assignPolygon(marker.feature, polygon, marker, color);
          }
        }
      }
    }

  }

  icons[t.category] = iconData[t.icon];
  counters[t.group] = counters[t.group] || {};

  if (getBaseName(t.category)==t.category) {
    counters[t.group][t.category] = (counters[t.group][t.category] || 0) + 1;
  }

  if (t.group=='misc') { marker.hide(); line.hide();}

  return marker;
}

function getRegionName(coord, polygons) {
  if (!polygons || !coord) return null;
  for (const polygon of polygons) {
    if (ptInPoly(coord, polygon.getCoordinates()[0])) {
      return polygon.properties.svgID.substring(1);
    }
  }
}


function scaleOrigin(coordinates, scaleFactor, origin) {
  return coordinates.map(coord => {
    const [x, y] = coord;
    return [
      origin[0] + x * scaleFactor + origin[0],
      origin[1] + y * scaleFactor + origin[1],
      -3, // sink region outline a bit (some markers are -3)
    ];
  });
}

function scaleGeoJSON(geojson, scaleFactor, origin) {
  geojson.features.forEach(feature => {
    if (feature.geometry) {
    feature.geometry.coordinates = feature.geometry.coordinates.map(ring =>
      scaleOrigin(ring, scaleFactor, origin)
    );
    }
  });
  return geojson;
}


function addRegions(geojson) {
  const defaultSymbol = {
    lineColor: '#fff',
    polygonFill: '#fff',
    lineJoin: 'round',
    polygonOpacity: 0.1,
    lineOpacity: 0.5,
    lineWidth: 5,
  };

  geojson = scaleGeoJSON(geojson, 73 / 1, [-191800, 182900]);

  var polygons = maptalks.GeoJSON.toGeometry(geojson);

  polygons = polygons.filter(p => p);

  polygons.forEach((polygon, index) => {
    if (polygon.getType() !== 'Polygon') return;

    polygon.setSymbol(defaultSymbol);

    let name = 'poly_' + index;

    polygon.properties = {};
    polygon.properties.svgID = '#' + name;
    polygon.feature = { properties: { title: name } };
  });

  let layerId = 'areas';
  let visible = true;

  let layer = new maptalks.PolygonLayer(layerId, polygons, { visible });

  for (marker of layer._geoList) {
    marker.hide();
  }

  return layer;
}



function parabola(start, end, maxHeight = null, steps = 50) {
  const [x0, y0, z0] = start;
  const [x1, y1, z1] = end;
  const dx = x1 - x0;
  const dy = y1 - y0;
  const horizontalDistance = Math.sqrt(dx * dx + dy * dy);
  const baseHeight = Math.max(z0, z1);
  if (maxHeight === null) maxHeight = baseHeight + horizontalDistance / 8;
  else maxHeight = Math.max(maxHeight, baseHeight + 0.001);
  const points = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = x0 + dx * t;
    const y = y0 + dy * t;
    const z = z0 * (1 - t) + z1 * t + 4 * (maxHeight - baseHeight) * t * (1 - t);
    //points.push([x, y, z]);
    points.push({x:x, y:y, z:z}); // needed for simplify
  }
  return points;
}

function loadMarkersBatched(features, options) {
  const batchSize = 1000;
  let currentIndex = 0;
  let result = [];
  function processBatch() {
    const batch = [];
    const endIndex = Math.min(currentIndex + batchSize, features.length);
    for (; currentIndex < endIndex; currentIndex++) {

      let feature = features[currentIndex];
      let marker = addMarker(feature, options);
      batch.push(marker);

      let o = feature.properties;
      let t = getType(o);

      if (o.spawns) {
        batch.push(addMarker({...feature, properties: {name: o.name +':spawns', type: o.spawns }}, options));
      }

      let targets = o.target ? [o.target] : (o.targets ? o.targets : []);
      for (const target of targets) {
        batch.push(addMarker({...feature, geometry: {coordinates: target}, properties: {name: o.name +':target', type: o.type + ':target' }}, options));

        let start = applyHeightFactor(feature.geometry.coordinates);
        let end = applyHeightFactor(target);
        let opacity = settings.markedItems[o.name] ? markedOpacity : 1;

        let points = parabola(start, end);

        points = simplify(points, 2);

        let line = new maptalks.LineString(points, { symbol: { lineOpacity: opacity, lineColor: getLineColor(t), lineWidth: 3 } });

        let layers = options.layers;
        layers.lines = layers.lines||[];
        layers.lines.push(line);
        line.feature = feature;
      }

      if (o.type == 'BP_StaticLifepod_Surface_C' && !settings.playerPosition) {
        const t = feature.geometry.coordinates;
        settings.playerPosition = [t[0]+1000,t[1],0];
      }
    }

    result.push(...batch);

    if (currentIndex < features.length) {
      setTimeout(processBatch, 0); // Allow time for browser events
    } else {
      console.timeEnd('parsing markers');
      addMarkers(result, options);
    }

    if (!playerMarker) {
      //console.log('added player marker at', settings.playerPosition);
      let feature = {
        "type": "Feature",
        "geometry": {
          "type": "Point",
          "coordinates": settings.playerPosition,
        },
        "properties": {
          "type": playerMarkerType,
          "name": "Player Marker",
          "title": "Player Marker",
        }
      };

      playerMarker = addMarker(feature, options);
      batch.push(playerMarker);

      playerMarker.on('dragend', function(e) {
        const marker = e.target;
        const c = marker.getCoordinates();
        const fc = marker.feature.geometry.coordinates;
        fc[0] = c.x;
        fc[1] = c.y;
        settings.playerPosition = fc;
        //console.log('updating player marker to', settings.playerPosition);
        saveSettings();
      });

      playerMarker.on('dragstart', function(e) {
        activeMarker?.closeInfoWindow();
      })
    }

    // preload polygons from regions.json, re-assign later with hit check
    if (regionData && !regionDataLoaded) {
      regionDataLoaded = true;
      let layer = addRegions(regionData);
      //console.log('loaded', polygons.length, 'polygons', polygons);
      let groupLayer = map.getLayer('GroupGLLayer');
      layer.addTo(groupLayer); // filtered
      //layer.addTo(map); // always visible
    }

  }
  setTimeout(processBatch, 0); // Start processing asynchronously

}

  let area = mapId;

  counters = {};

  let options = {layers: {}, counters: counters, icons: {}};

  /*
  if (legacy) {

    for (o of data) {
      let [x,y,z] = [o.lng, o.lat, o.alt];
      let c = [x,y,z];

      if (o.type && typeof o.type === 'string' && o.type.includes(':')) o.type = o.type.split(':')[1]; // cut off ':' prefixes NB! new format?
      features.push(feature);
    }
    data = features;
  }
  */

  data = data.features;

  for (const [label, prop] of Object.entries(regionMarkers)) {
    let feature = {
      geometry: { 
        coordinates: [prop.location[0], prop.location[1], 0] 
      }, 
      properties: {
        title: prop.name,
        name: prop.name,

  }

  console.time('parsing markers');
  loadMarkersBatched(data, options);
}


function hideAll() {
  settings.activeItems = {};
  updateItems();
  return false;
}

function showAll() {
  settings.activeItems = {};
  for (const groupName of Object.keys(counters)) {
    for (const name of Object.keys(counters[groupName])) {
      settings.activeItems[name] = true;
    }
  }
  updateItems();
  return false;
}

function showGroup(group) {
  settings.activeItems = {};
  for (const groupName of Object.keys(counters)) {
    for (const name of Object.keys(counters[groupName])) {
     if (group==groupName) settings.activeItems[name] = true;
    }
  }
  updateItems();
  return false;
}

function showItem(name) {
  settings.activeItems = {};
  settings.activeItems[name] = true;
  updateItems();
  return false;
}

function toggleGroup(group) {
  let counter = 0;
  let total = 0;

  for (const name of Object.keys(counters[group])) {
    if (settings.activeItems[name]!=true) counter += 1;
    total += 1;
  }

  let selected = false;

  if (counter==total) {
    selected = true;
  }

  for (const name of Object.keys(counters[group])) {
    if (selected) {
      settings.activeItems[name] = true;
    } else {
      delete settings.activeItems[name];
    }
  }

  updateItems();
}

function toggleItem(name) {
  settings.activeItems[name] = !settings.activeItems[name];
  updateItems();
}

function updateView() {
  let zoom = map.getZoom();

  if (settings.searchText) {
    return;
  }

  for(const [layerName, zoomLevel] of Object.entries(zoomGroups)) {
    let groupLayer = map.getLayer('GroupGLLayer');
    let layer = groupLayer.getLayer(layerName);
    if (layer) {
      let [minZoom, maxZoom] = zoomLevel;
      if (zoom>=minZoom+0.5 && zoom < maxZoom+0.5) {
        layer.show();
      } else {
        layer.hide();
      }
    }
  }

function addMarkers(markers, options) {
  let [layers,counters,icons] = [options.layers, options.counters, options.icons];

  let groupLayer = map.getLayer('GroupGLLayer');

  for (const [name, geometries] of Object.entries(layers)) {
    if (name=='lines') {
      new maptalks.LineStringLayer(name, geometries, {
        style: { filter: true, symbol: { lineColor: '#eee', lineWidth: 4, lineOpacity: 0.75 } },
      }).addTo(groupLayer);
    }else if (name=='polygons') {
      new maptalks.PolygonLayer(name, geometries, {
        visible: true,
      }).addTo(groupLayer);
    } else if (name=='gltf') {
      new maptalks.GLTFLayer('gltf', geometries,{
        opacity: 0.5,
      }).addTo(groupLayer);
    } else {
      new maptalks.PointLayer(name, geometries, {
        sceneConfig: { depthFunc: '<='}, // <= fixes text halo
        //hitColor: [0, 0, 0, 0], // Color used for hit detection
        //hitTolerance: 1 // Tolerance for hit detection
      }).addTo(groupLayer);
    }
  }

  // let tr = s=> typeData[s]?.title || (s[0].toUpperCase()+s.slice(1));
  //let tr = s=> typeData[s]?.title || translate(s);
  //let tr = s=> getType({"type": s}).title || s; //getType({"type": s}).title || translate(s)

  tr = s=> capitalize(getType({"type": s}).title || s);

  markersControl = new MarkersControl(counters, {theme: theme, icons: icons, weights:{collectible: 1, misc:-2, actors:-1}, groupCallback: toggleGroup, itemCallback: toggleItem, translate: tr });

  console.time('filtering markers');

  updateView();

  let name = mapParam.markerName;
  mapParam = {};
  if (name) {
    searchByTitle(name);
  } else {
    if (settings.filter) {
      searchControl._input.value = settings.filter;
      searchItems(settings.filter);
    } else {
      updateItems();
    }
  }

  console.timeEnd('filtering markers');
}

function parseSearchOptions(line) {
  if (!line) line = '';

  const terms = ['group', 'type', 'title'];
  const result = {};

  for (const key of terms) {
    const match = line.match(new RegExp(`\\b${key}:([^\\s]+)`));
    if (match) {
      result[key] = match[1];
      line = line.replace(match[0], ''); // strip from text
    }
  }

  line = line.trim();
  if (line) result.text = line;

  return result;
}

function showRelatedMarkers(name) {
  let groupLayer = map.getLayer('GroupGLLayer');
  for (const layer of groupLayer.getLayers()) {
    for (marker of layer._geoList) {
      let alias = getBaseName(name);
      if (alias==getBaseName(marker.feature.properties.name)) {
        marker.show();
      }
    }
  }
}

function searchByTitle(title) {
  let term = title.toLowerCase();
  let selectedMarker = null;
  let counter = 0;
  let groupLayer = map.getLayer('GroupGLLayer');

  for (const layer of groupLayer.getLayers()) {
    for (marker of layer._geoList) {

      let res = false;
      if (marker.feature) {
        let t = getType(marker.feature);
        let o = marker.feature.properties;

        if (t.title) {
          let src = t.title.toLowerCase();
          res = src==term || src==term.replaceAll('_',' ');
        }

        if (!res) res = title == o.name;

      }

      if (res) {
        marker.show();
        if (marker.type != 'LineString') {
          if (!selectedMarker) selectedMarker = marker;
          counter += 1;
        }
      } else {
        marker.hide();
      }

    }
  }

  if (counter==1 && selectedMarker) {
    let marker = selectedMarker;
    showRelatedMarkers(marker.feature.properties.name);
    popupOnClick({target: marker});
    marker.openInfoWindow();
  }

}


function searchItems(text) {
  let groupLayer = map.getLayer('GroupGLLayer');

  settings.filter = text;

  if (text=='') {
    updateItems();
    return;
  }

  saveSettings();

  let terms = [];
  if (text) {
    terms = text.toLowerCase().split(/\s+/);
  }

  let counter = 0
  let lastMarker = null;

  for (const layer of groupLayer.getLayers()) {
    for (marker of layer._geoList) {

      let res = false;

      if (marker.feature) {
        let t = getType(marker.feature);
        let o = marker.feature.properties;
        res = false;

        let mask = {};
        if (!res && terms.length) {
          for (let s of [t.type, t.title, ...Object.values(o), ...Object.keys(o)]) {
            if (!s) continue;
            s = String(s).toLowerCase();
            for (const term of terms) {
              if (mask[term]) continue;
              if (s.includes(term)) {
                mask[term] = true;
              }
            }
          }
          res = terms.every(term=>mask[term]);
        }
      }

      if (res) {
        if (marker.type != 'LineString') counter += 1;
        marker.show();
      } else {
        marker.hide();
      }
    }
  }

  searchControl._input.title = `${counter} markers`;

  return false;
}

function renderFAIconToImageURL(fa_class, bg, fg='white', size=48) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  function drawFAIcon(prefix, iconName, color, pixelSize, dy = 0) {
    let icon = FontAwesome.icon({ prefix, iconName });

    if (!icon) icon = FontAwesome.icon({ prefix:'fa', iconName: 'question-circle' });

    const [w, h, , , path] = icon.icon;
    const scale = pixelSize / h;
    const iconWidthPx = w * scale;
    const dx = (size - iconWidthPx) / 2;
    const dyPx = (size - pixelSize) / 2 + dy;
    ctx.setTransform(scale, 0, 0, scale, dx, dyPx);
    ctx.fillStyle = color;
    ctx.fill(new Path2D(path));
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  function parseFAClass(faClass) {
    const parts = faClass.trim().split(/\s+/);
    const prefix = parts.find(p => p.startsWith('fa-') || p === 'fa')?.replace('fa-', '') || 'solid';
    const iconName = parts.find(p => p.startsWith('fa-') && p !== 'fa' && p !== `fa-${prefix}`)?.replace('fa-', '');
    const prefixMap = { solid: 'fas', regular: 'far', light: 'fal', thin: 'fat', duotone: 'fad', brands: 'fab' };
    return { prefix: prefixMap[prefix] || 'fas', iconName };
  }

  fg = fg || 'white';
  bg = bg || 'grey';
  let t = parseFAClass(fa_class);
  drawFAIcon('fas', 'location-pin', 'black', size * 1.0);
  drawFAIcon('fas', 'location-pin', bg, size * 0.976);
  drawFAIcon(t.prefix, t.iconName, fg, size * 0.45, -size/8);
  return canvas.toDataURL('image/png');
}

    }

    switch (e.code) {

function saveLocalData() {
  let data = localStorage.getItem(localDataName);
  if (window.showSaveFilePicker) {
    window.showSaveFilePicker({suggestedName: localDataName+'.json'}).then(f=>f.createWritable()).then(f=>f.write(data).then(()=>f.close()));
  } else {
    let filename = localDataName+'.json';
    let blob = new Blob([data], {type: "text/json"});
    if(navigator.msSaveOrOpenBlob) {
        navigator.msSaveOrOpenBlob(blob, filename);
    } else {
        var a = document.body.appendChild(document.createElement("a"));
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        a.remove();
    }
  }
}

function updateItems() {
  searchControl._input.value='';

  let groupLayer = map.getLayer('GroupGLLayer');

  for (const layer of groupLayer.getLayers()) {
    for (marker of layer._geoList) {

      let t = getType(marker.feature.properties);
      let type = getBaseName(t.category);

      if (settings.activeItems[type]) {
        marker.show();
        //console.log('show', marker.feature.properties.name);
      } else {
        marker.hide();
      }

    }
  }

  document.querySelectorAll('.markers-control-group').forEach(group => {
    const items = group.parentElement.querySelectorAll('.markers-control-item');
    let anySelected = false;
    items.forEach(item => {
      let type = getBaseName(item.dataset.name);
      const selected = settings.activeItems[type]==true;
      item.classList.toggle('selected', selected);
      anySelected ||= selected;
    });
    group.classList.toggle('selected', anySelected);
  });

  saveSettings();
}

function markItems() {
  let groupLayer = map.getLayer('GroupGLLayer');
  for (const layer of groupLayer.getLayers()) {
    for (marker of layer._geoList) {
      let name = getBaseName(marker.feature.properties.name);
      let opacity =  (settings.markedItems[name] || settings.markedItems[name+':spawns']) ? markedOpacity : 1;
      marker.updateSymbol({markerOpacity: opacity, lineOpacity: opacity });
    }
  }
}
