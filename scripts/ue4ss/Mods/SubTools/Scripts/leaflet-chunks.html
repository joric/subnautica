<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">  
<link rel="shortcut icon" type="image/x-icon" href="data:," />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet-boundary-canvas@1.0.0/BoundaryCanvas.min.js"></script>


<style>

html, body, #map { width:100%; height: 100%; margin: 0; padding: 0; }
.leaflet-grab { cursor: auto; }

.leaflet-tile {
  border: 1px dashed rgba(255, 255, 255, 0.5) !important;
}

</style>

<div id="map"></div>

<div id="controls" style="position: absolute; left: 60px; top: 10px; z-index: 4000">
<form id="myForm">
  <input type="text" id="baseChunk" placeholder="base chunk path" name="baseChunk" value="" size=48/>
  <input type="submit" value="update"/>
</form>
</div>

<script>
let chunkSize = 12800;
let tileSize = 4096;
let baseChunk = 'Capture_v1/Chunk_25600_2048p_-10_16.png';
let map = null;

let localDataName = 'joricsSubnauticaChunks';
let defaults = { baseChunk: baseChunk };
let localData = JSON.parse(localStorage.getItem(localDataName)) || defaults;
let settings = localData;

let centerX = 0
let centerY = 0;
let tileZoom = 4;

let tileLayer = null;

function saveSettings() {
  localStorage.setItem(localDataName, JSON.stringify(localData));
}

function parseBaseChunk(baseChunk='Capture/Chunk_12800_4096p_-18_31.png') {
  let x=0;
  let y=0;

  // Parse with regex
  let match = baseChunk.match(/(.*)_(\d+)_(\d+)p_(-?\d+)_(-?\d+)\.png/);

  if (match) {
    let base = match[1];
    chunkSize = parseInt(match[2]);  // 12800
    tileSize = parseInt(match[3]);   // 2048
    x = parseInt(match[4]);          // -29
    y = parseInt(match[5]);          // 22
    //console.log(chunkSize, tileSize, x, y);

    tileZoom = Math.floor(Math.log2(tileSize));
    let scale = (chunkSize * Math.pow(2, tileZoom)) / tileSize;

    centerX = (x + 0.5) * chunkSize / scale;
    centerY = (y + 0.5) * chunkSize / scale * -1;
    //console.log(chunkSize, tileSize, x, y, tileZoom, centerX, centerY);

    settings.baseChunk = baseChunk;

    settings.chunkSize = chunkSize;
    settings.tileSize = tileSize;
    settings.tileZoom = tileZoom;
    settings.x = x;
    settings.y = y;
    settings.template = `${base}_${chunkSize}_${tileSize}p_` + "{x}_{y}.png";

    settings.center = [centerY, centerX];
    settings.zoom = tileZoom-2;

    console.log('zoom', settings.zoom);

    console.log(settings);
    saveSettings();
  }

  if (settings.center) {
    console.log('seting map to', settings.center, settings.zoom);
    map.setView(settings.center, settings.zoom, { animate: false });
  }

  map.eachLayer(function(layer) {
      if (layer instanceof L.TileLayer) {
          map.removeLayer(layer);
      }
  });

  tileLayer = L.tileLayer(settings.template, {
    tileSize: settings.tileSize,
    minNativeZoom: settings.tileZoom,
    maxNativeZoom: settings.tileZoom,
  }).addTo(map);

}

window.onload = function() {
  document.getElementById('myForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const baseChunk = formData.get('baseChunk');
    parseBaseChunk(baseChunk);
  });

  if (settings.baseChunk) document.getElementById('baseChunk').value = settings.baseChunk;

  map = L.map('map', {
    crs: L.CRS.Simple,
    center: [0,0],
    minZoom: 0,
    maxZoom: 32,
    zoom: 0,
  });

  if (!settings.zoom || settings.zoom<5) settings.zoom = 5;

  if (settings.center) {
    map.setView(settings.center, settings.zoom, { animate: false });
  }

  console.log('template', settings.template);

  tileLayer = L.tileLayer(settings.template, {
    tileSize: settings.tileSize,
    minNativeZoom: settings.tileZoom,
    maxNativeZoom: settings.tileZoom,
  }).addTo(map);

  map.on('mousemove', function(e) {
    document.title = `${e.latlng.lng} ${e.latlng.lat} z: ${map.getZoom()}`;
  });

  map.on('moveend zoomend', function(e) {
    settings.center = [map.getCenter().lat, map.getCenter().lng]; // avoid circular refs here
    settings.zoom = map.getZoom();
    saveSettings();
  });
}

</script>
