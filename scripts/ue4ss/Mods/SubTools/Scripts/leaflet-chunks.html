<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">  
<link rel="shortcut icon" type="image/x-icon" href="data:," />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

<style>

html, body, #map { width:100%; height: 100%; margin: 0; padding: 0; }
.leaflet-grab { cursor: auto; }

</style>

<div id="map"></div>

<div id="controls" style="position: absolute; left: 100px; top: 10px; z-index: 4000">
  <select name="tileSize">
    <option value="512">tileSize</option>
    <option>512</option>
    <option>1024</option>
    <option>2048</option>
    <option>4096</option>
    <option>8192</option>
  </select>
</div>

<script>

window.onload = function() {

  let localDataName = 'joricsSubnauticaChunks';
  let localData = JSON.parse(localStorage.getItem(localDataName)) || {chunkSize: 12800, tileSize: 4096};
  let settings = localData;

  function saveSettings() {
    localStorage.setItem(localDataName, JSON.stringify(localData));
  }


  let chunkSize = 256;
  let tileSize = 256;
  let x=-29;
  let y=22;

  //let baseChunk = 'Chunk_12800_2048p_-27_33.png';
  //let baseChunk = 'Chunk_12800_2048p_-19_33.png';

  s = 'Chunk_12800_4096p_-18_31.png'


  // Parse with regex
  let match = s.match(/Chunk_(\d+)_(\d+)p_(-?\d+)_(-?\d+)\.png/);
  if (match) {
      chunkSize = parseInt(match[1]);  // 12800
      tileSize = parseInt(match[2]);   // 2048
      x = parseInt(match[3]);          // -29
      y = parseInt(match[4]);          // 22
      console.log(chunkSize, tileSize, x, y);
  }

  let tileZoom = Math.floor(Math.log2(tileSize));

  let scale = (chunkSize * Math.pow(2, tileZoom)) / tileSize;
  let centerX = (x + 0.5) * chunkSize / scale;
  let centerY = (y + 0.5) * chunkSize / scale * -1;

  const map = L.map('map', {
    crs: L.CRS.Simple,
    center: [centerY, centerX],
    minZoom: 0,
    maxZoom: 21,
    zoom: tileZoom,
  });

  if (settings.center && settings.zoom) {
    map.setView(settings.center, settings.zoom, { animate: false });
  }

  //let tilesLayer = L.tileLayer('captureTiles/Chunk_'+tileSize+'p_{x}_{y}.png', {
  let tilesLayer = L.tileLayer('Capture/Chunk_'+chunkSize+'_'+tileSize+'p_{x}_{y}.png', {
    tileSize: tileSize,
    minNativeZoom: tileZoom,
    maxNativeZoom: tileZoom,
  }).addTo(map);

  map.on('mousemove', function(e) {
    document.title = `${e.latlng.lat} ${e.latlng.lng} z: ${map.getZoom()}`;
  });

  map.on('moveend zoomend', function(e) {
    settings.center = [map.getCenter().lat, map.getCenter().lng]; // avoid circular refs here
    settings.zoom = map.getZoom();
    saveSettings();
  });

}

</script>
