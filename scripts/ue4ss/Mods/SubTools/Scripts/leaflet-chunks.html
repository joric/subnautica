<meta charset="utf-8">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

<style>

html, body, #map { width:100%; height: 100%; margin: 0; padding: 0; }

</style>

<div id="map"></div>

<script>

window.onload = function() {

  let tileSize = 2048;

  let tileZoom = Math.floor(Math.log2(tileSize)) - 4;

  const map = L.map('map', {
    crs: L.CRS.Simple,
    //center: [0,0],

    center: [-270,-210],

    //center: [-270*2,-210*2],

    minZoom: 0,
    maxZoom: 21,
    zoom: tileZoom-1,
  });

  //let tilesLayer = L.tileLayer('captureTiles/Chunk_'+tileSize+'p_{x}_{y}.png', {
  let tilesLayer = L.tileLayer('Capture/Chunk_'+tileSize+'p_{x}_{y}.png', {
    tileSize: tileSize,
    minNativeZoom: tileZoom,
    maxNativeZoom: tileZoom,
  }).addTo(map);

  map.on('mousemove', function(e) {
    let p = {x:e.latlng.lng, y:e.latlng.lat};
    document.title = p.x.toFixed(2) + ', ' + p.y.toFixed(2) + ' z:' + map.getZoom();
  });

}

</script>
